# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  commit-message-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Lint commit messages in PR
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          commits=$(git rev-list --no-merges "$base"..HEAD)
          if [[ -z "$commits" ]]; then
            echo "no non-merge commits to lint"
            exit 0
          fi

          for sha in $commits; do
            echo "linting commit: $sha"
            git log -1 --pretty=%B "$sha" > /tmp/commit-msg.txt
            ./.github/scripts/lint-commit-msg.sh /tmp/commit-msg.txt
          done

  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.8.8
      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'adopt'
      - run: |
          export MAVEN_OPTS="-DskipTests -Dmaven.javadoc.skip=true -Dmaven.source.skip=true -Dgpg.skip=true"
          mvn -B -V -T 1 verify
          mvn -B -V -T 1 enforcer:enforce
